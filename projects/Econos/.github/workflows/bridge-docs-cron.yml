name: Bridge KB — Daily Sync

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run Bridge KB sync
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
        run: npx -y @noemuch/bridge-ds@6.0.0 cron --config docs.config.yaml
      - name: Open PR if changes
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: Bridge KB daily sync"
          branch: bridge-kb/cron-sync
          title: "Bridge KB sync"
          body-path: .bridge/last-sync-report.md
          delete-branch: true
          labels: bridge-kb, automated
